[FILE_PATH]
# report_html_name文件名称
report_html_name = test_result

[EXCEL_ROW]
# actual_col表格中实际结果行数
# result_col表格中执行结果行数
actual_col = 13
result_col = 14

[MSG]
# success_result用例执行成功的提示信息
# fail_result用例执行失败的提示信息
success_result = Pass
fail_result = Fail

[LOG]
# 日志器名称
logger_name = case
# 日志器日志等级
logger_level = DEBUG
# 输出到控制台的日志等级
console_level = ERROR
# 输出到文件的日志等级
file_level = INFO
# 日志文件名
log_filename = cases.log
# 一个日志文件最大字节数 (目前每个文件固定为100M)
maxBytes = 1024
# 日志文件总数
backupCount = 3
# 控制台使用的日志简单格式
# 如果出现%，需要%转义才行
simple_formatter = %%(asctime)s - [%%(levelname)s] - [日志信息]%%(message)s
# 日志文件使用的日志复杂格式
verbose_formatter = %%(asctime)s - [%%(levelname)s] - %%(module)s - %%(name)s - [日志信息]%%(message)s

[MYSQL_QA002]
# MYSQL_QA002数据库连接信息
host = xxxxxx
user = xxxxx
password = xxxxxx
db = retail_shop
port = 8305
charset = utf8

[TEST_ADDRESS]
# 测试环境qa002
qa002 = https://xxxxx/box-admin-api
# 测试环境-平台后台
test = http://xxxxxx

[REPORT]
title = 测试报告
verbosity = 2
description = xxxxx
tester = xxx

